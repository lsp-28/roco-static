<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>宠物图鉴</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black mb-8 text-gray-800">宠物图鉴</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded-2xl shadow flex items-center border border-gray-200">
                < img src="fire.png" class="w-16 h-16 object-contain shrink-0">
                <div class="ml-4"><h3 class="font-bold">火花</h3><span class="text-xs font-bold text-orange-500 bg-orange-50 px-2 py-0.5 rounded">火系</span></div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow flex items-center border border-gray-200">
                < img src="grass.png" class="w-16 h-16 object-contain shrink-0">
                <div class="ml-4"><h3 class="font-bold">喵喵</h3><span class="text-xs font-bold text-green-500 bg-green-50 px-2 py-0.5 rounded">草系</span></div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow flex items-center border border-gray-200">
                < img src="water.png" class="w-16 h-16 object-contain shrink-0">
                <div class="ml-4"><h3 class="font-bold">水蓝蓝</h3><span class="text-xs font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded">水系</span></div>
            </div>
        </div>
        <a href=" " class="inline-block mt-12 text-blue-600 font-bold hover:underline">← 返回首页</a >
    </div>
</body>
</html>
