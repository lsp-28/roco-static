<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国指南 - 宠物图鉴</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex min-h-screen font-sans">

    <aside class="w-64 bg-white border-r border-gray-100 p-6 hidden md:block shrink-0">
        <a href=" " class="text-blue-600 text-sm font-bold hover:underline">← 返回首页</a >
        <h2 class="text-2xl font-black text-gray-800 mt-6 mb-8">洛克王国指南</h2>
        <nav class="space-y-4">
            <a href="roco.html" class="block py-3 px-4 bg-blue-50 text-blue-700 rounded-xl 
font-bold transition">🐾 宠物图鉴</a >
            <a href="admin.html" class="block py-3 px-4 text-gray-500 hover:bg-gray-50 
rounded-xl transition">⚙️ 管理后台</a >
        </nav>
    </aside>

    <main class="flex-1 p-8 md:p-12">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-4xl font-black text-gray-900 mb-2">宠物图鉴</h1>
            <p class="text-gray-400 mb-10">初学者三大主宠系列</p >

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex 
items-center hover:shadow-md transition duration-300">
                    <div class="w-20 h-20 bg-orange-50 rounded-2xl flex items-center 
justify-center overflow-hidden shrink-0">
                        < img src="fire.png" alt="火花" class="w-16 h-16 object-contain">
                    </div>
                    <div class="ml-5">
                        <h3 class="text-lg font-bold text-gray-800 mb-2">火花</h3>
                        <span class="px-2.5 py-1 bg-orange-100 text-orange-600 text-[10px] 
font-black rounded-lg uppercase tracking-wider">Fire / 火</span>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex 
items-center hover:shadow-md transition duration-300">
                    <div class="w-20 h-20 bg-green-50 rounded-2xl flex items-center 
justify-center overflow-hidden shrink-0">
                        < img src="grass.png" alt="喵喵" class="w-16 h-16 object-contain">
                    </div>
                    <div class="ml-5">
                        <h3 class="text-lg font-bold text-gray-800 mb-2">喵喵</h3>
                        <span class="px-2.5 py-1 bg-green-100 text-green-600 text-[10px] 
font-black rounded-lg uppercase tracking-wider">Grass / 草</span>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex 
items-center hover:shadow-md transition duration-300">
                    <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center 
justify-center overflow-hidden shrink-0">
                        < img src="water.png" alt="水蓝蓝" class="w-16 h-16 object-contain">
                    </div>
                    <div class="ml-5">
                        <h3 class="text-lg font-bold text-gray-800 mb-2">水蓝蓝</h3>
                        <span class="px-2.5 py-1 bg-blue-100 text-blue-600 text-[10px] 
font-black rounded-lg uppercase tracking-wider">Water / 水</span>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
